<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoppy Whatsapp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
<img src="/images/zoppy.avif" alt="Zoppy" class="logo-img" />        <div>
          <!-- <div class="logo-name">Zoppy Whatsapp</div>
          <div class="logo-sub">Análise Whatsapp com IA</div> -->
        </div>
      </div>

      <div class="form-group">
        <label>Bearer Token</label>
        <div class="input-wrap">
          <input type="password" id="token" placeholder="EAAxxxxxxxx..." autocomplete="off" />
          <button class="eye-btn" onclick="toggleVisibility('token', this)" title="Mostrar/ocultar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>WABA ID</label>
        <input type="text" id="wabaId" placeholder="123456789012345" autocomplete="off" />
      </div>

      <div class="divider"></div>

      <!-- ── Dados do banco ── -->
      <div class="form-group">
        <label class="label-muted">Dados do banco Zoppy</label>

        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
          <div class="drop-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <span id="dropLabel">Cole ou selecione um print do banco</span>
        </div>

        <!-- Campos extraídos -->
        <div class="db-fields" id="dbFields" style="display:none">
          <div class="db-field-row">
            <span class="db-field-label">businessName</span>
            <span class="db-field-value" id="f-businessName">—</span>
          </div>
          <div class="db-field-row">
            <span class="db-field-label">scenario</span>
            <span class="db-field-value" id="f-scenario">—</span>
          </div>
          <div class="db-field-row">
            <span class="db-field-label">status</span>
            <span class="db-field-value" id="f-status">—</span>
          </div>
          <div class="db-field-row">
            <span class="db-field-label">syncAttempt</span>
            <span class="db-field-value" id="f-syncAttempt">—</span>
          </div>
          <div class="db-field-row">
            <span class="db-field-label">errorMessage</span>
            <span class="db-field-value" id="f-errorMessage">—</span>
          </div>
          <div class="db-field-row">
            <span class="db-field-label">active</span>
            <span class="db-field-value" id="f-active">—</span>
          </div>
          <div class="db-field-row">
            <span class="db-field-label">qualityRating</span>
            <span class="db-field-value" id="f-qualityRating">—</span>
          </div>
          <div class="db-field-row">
            <span class="db-field-label">phoneStatus</span>
            <span class="db-field-value" id="f-phoneStatus">—</span>
          </div>
          <button class="clear-btn" onclick="clearDb()">Limpar</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label class="label-muted">Rotas configuradas</label>
        <ul class="route-list" id="routeList">
          <li class="route-item skeleton"></li>
          <li class="route-item skeleton"></li>
        </ul>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="run-btn" id="runBtn" onclick="run()">
        <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
        <span id="btnLabel">Consultar e Analisar</span>
        <svg class="spinner" id="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </button>
      <p class="hint">⌘ Enter para executar</p>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <div class="empty" id="emptyState">
      <div class="empty-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <p>Preencha as credenciais e execute a análise.</p>
    </div>
  </main>

</div>

<script src="/js/app.js"></script>
</body>
</html>
