<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoppy Whatsapp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <img src="/images/zoppy.avif" alt="Zoppy" class="logo-img" />
      </div>

      <div class="form-group">
        <label>Bearer Token</label>
        <div class="input-wrap">
          <input type="password" id="token" placeholder="EAAxxxxxxxx..." autocomplete="off" />
          <button class="eye-btn" onclick="toggleVisibility('token', this)" title="Mostrar/ocultar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>WABA ID</label>
        <input type="text" id="wabaId" placeholder="123456789012345" autocomplete="off" />
      </div>

      <div class="divider"></div>

      <!-- ── Dados do banco ── -->
      <div class="form-group">
        <label class="label-muted">Dados do banco Zoppy</label>
        <div class="db-inputs">
          <div class="db-input-row">
            <span class="db-input-label">businessName</span>
            <input type="text" id="db-businessName" placeholder="—" autocomplete="off">
          </div>
          <div class="db-input-row">
            <span class="db-input-label">scenario</span>
            <input type="text" id="db-scenario" placeholder="—" autocomplete="off">
          </div>
          <div class="db-input-row">
            <span class="db-input-label">status</span>
            <input type="text" id="db-status" placeholder="—" autocomplete="off">
          </div>
          <div class="db-input-row">
            <span class="db-input-label">syncAttempt</span>
            <input type="number" id="db-syncAttempt" placeholder="—" autocomplete="off">
          </div>
          <div class="db-input-row">
            <span class="db-input-label">errorMessage</span>
            <input type="text" id="db-errorMessage" placeholder="—" autocomplete="off">
          </div>
          <div class="db-input-row">
            <span class="db-input-label">active</span>
            <input type="text" id="db-active" placeholder="true / false" autocomplete="off">
          </div>
          <div class="db-input-row">
            <span class="db-input-label">qualityRating</span>
            <input type="text" id="db-qualityRating" placeholder="GREEN / YELLOW / RED" autocomplete="off">
          </div>
          <div class="db-input-row">
            <span class="db-input-label">phoneStatus</span>
            <input type="text" id="db-phoneStatus" placeholder="—" autocomplete="off">
          </div>
        </div>
        <button class="clear-btn" onclick="clearDb()">Limpar campos</button>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="run-btn" id="runBtn" onclick="run()">
        <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
        <span id="btnLabel">Consultar e Analisar</span>
        <svg class="spinner" id="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </button>
      <p class="hint">⌘ Enter para executar</p>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">

    <!-- Painel de dados (esquerda) -->
    <div class="data-panel" id="dataPanel">
      <div class="empty" id="emptyState">
        <div class="empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </div>
        <p>Preencha as credenciais e execute a análise.</p>
      </div>
    </div>

    <!-- Painel da IA (direita, sempre visível) -->
    <div class="ai-panel">
      <div class="ai-block" id="aiBlock">
        <div class="ai-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 18a8 8 0 110-16 8 8 0 010 16zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
          Análise — GPT
        </div>
        <div class="ai-body" id="aiBody" data-raw="">
          <span class="ai-placeholder">Execute a análise para ver o diagnóstico aqui.</span>
        </div>
      </div>
    </div>

  </main>

</div>

<script src="/js/app.js"></script>
</body>
</html>
